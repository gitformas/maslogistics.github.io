<!DOCTYPE html>
<html lang="en"><head><style>body {transition: opacity ease-in 0.2s; } 
body[unresolved] {opacity: 0; display: block; overflow: hidden; position: relative; }

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-message">Page Not Found</h2>
            <p class="error-description">Sorry, the page you are looking for might have been removed or is temporarily unavailable.</p>
            <a href="index.html" class="back-home">Go Back to Home</a>
        </div>
    </div>


<style>
    /* Reset default margin, padding, and box-sizing */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Set the background and center the content */
body {
    font-family: 'Arial', sans-serif;
    height: 100vh;
    background-color: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* Container to hold the error message */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Style the error code */
.error-code {
    font-size: 150px;
    font-weight: bold;
    color: #ff6347;  /* Tomato red */
    margin-bottom: 20px;
}

/* Style the error message */
.error-message {
    font-size: 32px;
    color: #333;
    margin-bottom: 20px;
}

/* Description for the error */
.error-description {
    font-size: 18px;
    color: #666;
    margin-bottom: 30px;
    max-width: 600px;
}

/* Style the "Back to Home" link */
.back-home {
    text-decoration: none;
    font-size: 18px;
    color: #fff;
    background-color: #007bff;
    padding: 12px 25px;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}

.back-home:hover {
    background-color: #0056b3;  /* Darker blue on hover */
}
